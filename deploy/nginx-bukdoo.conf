# /etc/nginx/sites-available/thundersui 로 저장 후 심볼릭 링크
#   sudo ln -s /etc/nginx/sites-available/thundersui /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ★ HTTP 전용 초기 설정. `sudo certbot --nginx -d thundersui.com -d www.thundersui.com`
#   를 실행하면 certbot 이 이 블록에 443/SSL 서버와 80→443 리다이렉트를 자동 추가한다.
# ★ 이미 80/443 에 다른 사이트가 있어도 server_name 으로 구분되어 충돌 없음.

server {
    listen 80;
    listen [::]:80;
    server_name thundersui.com www.thundersui.com;

    # 프론트 정적 파일 (vite build 결과)
    root /var/www/bukdoo/frontend/dist;
    index index.html;

    client_max_body_size 20M;   # 엑셀 업로드 여유

    # 백엔드 API → gunicorn(8100)
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 라우팅 (React Router) — 새로고침 404 방지
    location / {
        try_files $uri $uri/ /index.html;
    }
}
