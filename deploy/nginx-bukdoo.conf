# /etc/nginx/sites-available/thundersui 로 저장 후 심볼릭 링크
#   sudo ln -s /etc/nginx/sites-available/thundersui /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 도메인: thundersui.com (www 포함)
# 이미 80/443 에서 여러 사이트가 도므로, server_name 으로 구분된다 (충돌 없음)

server {
    listen 80;
    listen [::]:80;
    server_name thundersui.com www.thundersui.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thundersui.com www.thundersui.com;

    # certbot 으로 발급 (아래 배포문서 참고). 발급 후 경로 자동 채워짐.
    ssl_certificate     /etc/letsencrypt/live/thundersui.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thundersui.com/privkey.pem;

    # 프론트 정적 파일 (vite build 결과)
    root /var/www/bukdoo/frontend/dist;
    index index.html;

    client_max_body_size 20M;   # 엑셀 업로드 여유

    # 백엔드 API → gunicorn(8100)
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 라우팅 (React Router BrowserRouter) — 새로고침 404 방지
    location / {
        try_files $uri $uri/ /index.html;
    }
}
